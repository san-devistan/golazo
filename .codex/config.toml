[mcp_servers.shadcn]
command = "npx"
args = ["shadcn@latest", "mcp"]

[mcp_servers.vercel]
url = "https://mcp.vercel.com"

[mcp_servers.convex]
command = "npx"
args = ["-y", "convex@latest", "mcp", "start"]

[mcp_servers.better-auth]
url = "https://mcp.better-auth.com/mcp"

[mcp_servers.resend]
command = "npx"
args = ["-y", "resend-mcp"]

[mcp_servers.resend.env]
RESEND_API_KEY = "re_xxxxxxxxx"

[mcp_servers.stripe]
url = "https://mcp.stripe.com"

[mcp_servers.cloudinary-asset-mgmt]
url = "https://asset-management.mcp.cloudinary.com/mcp"

[mcp_servers.cloudinary-env-config]
url = "https://environment-config.mcp.cloudinary.com/mcp"

[mcp_servers.cloudinary-smd]
url = "https://structured-metadata.mcp.cloudinary.com/mcp"

[mcp_servers.cloudinary-analysis]
url = "https://analysis.mcp.cloudinary.com/sse"
